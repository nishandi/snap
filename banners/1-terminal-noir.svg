<svg width="1280" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-3%" y="-4%" width="106%" height="112%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- Desktop background -->
  <rect width="1280" height="400" fill="#080808"/>

  <!-- Terminal window: rx=2 — Windows sharp, not Mac soft -->
  <rect x="90" y="14" width="1100" height="372" rx="2" fill="#0d0d0d" filter="url(#shadow)"/>

  <!-- ═══ TAB BAR ═══ -->
  <rect x="90" y="14" width="1100" height="36" fill="#1e1e1e"/>

  <!-- Windows Terminal "wt" icon (blue square with ❯) -->
  <rect x="98" y="18" width="28" height="26" rx="3" fill="#1a4db3"/>
  <text x="112" y="35" font-family="Consolas,monospace" font-size="13" fill="#ffffff" text-anchor="middle">❯</text>

  <!-- Active tab: Claude Code — same bg as terminal, orange top accent -->
  <rect x="132" y="14" width="190" height="36" fill="#0d0d0d"/>
  <rect x="132" y="14" width="190" height="2" fill="#CF7655"/>

  <!-- Tab icon: small pixel-art Claude face -->
  <g transform="translate(142, 22)" fill="#CF7655">
    <rect x="0" y="0" width="18" height="18" rx="2"/>
    <rect x="3" y="4" width="4" height="5" fill="#0d0d0d"/>
    <rect x="11" y="4" width="4" height="5" fill="#0d0d0d"/>
    <rect x="4" y="12" width="10" height="3" fill="#0d0d0d"/>
  </g>
  <text x="167" y="37" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#cccccc">Claude Code</text>
  <text x="308" y="35" font-family="Arial,sans-serif" font-size="9" fill="#555555">✕</text>

  <!-- Separator + new tab + dropdown -->
  <line x1="322" y1="20" x2="322" y2="44" stroke="#333333" stroke-width="1"/>
  <text x="336" y="38" font-family="Arial,sans-serif" font-size="18" fill="#555555">+</text>
  <text x="364" y="36" font-family="Arial,sans-serif" font-size="11" fill="#555555">▾</text>

  <!-- Window controls: ─ □ ✕ (top right, sharp, flat) -->
  <line x1="1110" y1="32" x2="1128" y2="32" stroke="#888888" stroke-width="1.2"/>
  <rect x="1143" y="24" width="15" height="13" rx="0" fill="none" stroke="#888888" stroke-width="1.2"/>
  <line x1="1169" y1="23" x2="1185" y2="37" stroke="#888888" stroke-width="1.2"/>
  <line x1="1185" y1="23" x2="1169" y2="37" stroke="#888888" stroke-width="1.2"/>

  <!-- ═══ CLAUDE CODE WELCOME BOX — sharp corners, orange 1px border ═══ -->
  <rect x="106" y="58" width="1068" height="244" rx="0" fill="none" stroke="#CF7655" stroke-width="1"/>

  <!-- Label breaking the top border line -->
  <rect x="113" y="52" width="202" height="14" fill="#0d0d0d"/>
  <text x="117" y="63" font-family="Consolas,'Courier New',monospace" font-size="13" fill="#CF7655" font-weight="bold">Claude Code</text>
  <text x="225" y="63" font-family="Consolas,'Courier New',monospace" font-size="13" fill="#555555"> v2.1.37</text>

  <!-- Panel divider -->
  <line x1="440" y1="58" x2="440" y2="302" stroke="#CF7655" stroke-width="1"/>

  <!-- ─── LEFT PANEL: Claude pixel-art mascot ─── -->
  <!-- Center of left panel: x=273, center of box: y=180 -->
  <!-- Art spans y=-12 to y=80 (h=92), center at y=34 → translate y = 180-34 = 146 -->
  <!-- Art spans x=-2 to x=62 (w=64), center at x=30 → translate x = 273-30 = 243 -->
  <g transform="translate(243, 146)" fill="#CF7655">
    <!-- Antenna -->
    <rect x="23" y="-12" width="14" height="10"/>
    <!-- Head — wide block -->
    <rect x="5" y="0" width="50" height="44"/>
    <!-- Left eye cutout -->
    <rect x="11" y="10" width="14" height="17" fill="#0d0d0d"/>
    <!-- Right eye cutout -->
    <rect x="35" y="10" width="14" height="17" fill="#0d0d0d"/>
    <!-- Mouth/chin cutout -->
    <rect x="15" y="33" width="30" height="8" fill="#0d0d0d"/>
    <!-- Body -->
    <rect x="9" y="46" width="42" height="22"/>
    <!-- Arms -->
    <rect x="-2" y="48" width="9" height="16"/>
    <rect x="53" y="48" width="9" height="16"/>
    <!-- Legs -->
    <rect x="13" y="70" width="14" height="10"/>
    <rect x="33" y="70" width="14" height="10"/>
  </g>

  <!-- ─── RIGHT PANEL ─── -->
  <text x="462" y="94" font-family="Consolas,'Courier New',monospace" font-size="13" fill="#CF7655" font-weight="bold">Tips for getting started</text>
  <text x="462" y="118" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#cccccc">Type  snap:  in Claude. Alt-tab to your app.</text>
  <text x="462" y="138" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#cccccc">Claude sees what's on screen and responds directly.</text>
  <text x="462" y="158" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#555555">No file dragging. No clipboard. Zero friction.</text>


  <!-- ═══ SEPARATOR (Claude Code shows this line below the box) ═══ -->
  <line x1="90" y1="316" x2="1190" y2="316" stroke="#222222" stroke-width="1"/>

  <!-- ═══ PROMPT: > snap:█ ═══ -->
  <text x="106" y="344" font-family="Consolas,'Courier New',monospace" font-size="20" fill="#aaaaaa">&gt;</text>
  <text x="130" y="344" font-family="Consolas,'Courier New',monospace" font-size="20" fill="#ffffff">snap:</text>

  <!-- Block cursor: sharp rect, Claude orange, blinking -->
  <!-- "snap:" = 5 chars × 12px = 60px → cursor at x=190 -->
  <rect x="190" y="324" width="12" height="23" fill="#CF7655" rx="0">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
